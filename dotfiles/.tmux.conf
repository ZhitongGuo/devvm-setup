# .tmux.conf
# See https://fburl.com/tmux for more info.

# ─── Core ────────────────────────────────────────────────────────────────────
set -g default-command "${SHELL}"
set -g history-limit 500000
set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -s escape-time 0
set -g mouse on

# ─── Status bar ──────────────────────────────────────────────────────────────
set -g status-right "#{s/.facebook.com//:host} • %Y-%m-%d %H:%M"

# ─── Copy-paste (OSC 52 — works over SSH via Ghostty/iTerm2) ────────────────
# Enable OSC 52 clipboard passthrough — terminal emulator handles clipboard
set -g set-clipboard on
set -as terminal-features ",xterm-256color:clipboard"

# Vi-mode for copy mode
setw -g mode-keys vi

# Enter copy mode: prefix + [
# Visual select: v (char) or V (line) or C-v (block)
# Yank: y (copies via OSC 52 to system clipboard)
# Paste: prefix + ]
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Mouse drag auto-copies to clipboard (via OSC 52)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Double-click selects word, triple-click selects line
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# ─── Pane navigation ────────────────────────────────────────────────────────
# Alt+arrow to switch panes (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# ─── Quality of life ────────────────────────────────────────────────────────
# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase display time for pane indicators
set -g display-panes-time 2000
